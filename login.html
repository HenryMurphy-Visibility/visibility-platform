<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visibility — Sign In</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=JetBrains+Mono:wght@300;400;500&display=swap');

  :root {
    --bg:      #07080f;
    --surface: #0d0f1a;
    --border:  #1a1e2e;
    --accent:  #2E5FA3;
    --accent2: #4a7fc1;
    --text:    #d8dce8;
    --muted:   #5a6080;
    --muted2:  #8a90a8;
    --fail:    #7a2a2a;
    --fail-t:  #e05555;
    --mono:    'JetBrains Mono', monospace;
    --serif:   'Crimson Pro', Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--serif);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(46,95,163,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(46,95,163,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .login-wrap {
    width: 100%;
    max-width: 380px;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  .login-brand {
    text-align: center;
    margin-bottom: 40px;
  }

  .login-brand h1 {
    font-family: var(--serif);
    font-size: 2em;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 6px;
  }

  .login-brand p {
    font-family: var(--mono);
    font-size: 0.65em;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 32px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }

  label {
    font-family: var(--mono);
    font-size: 0.62em;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85em;
    padding: 10px 12px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .btn-login {
    width: 100%;
    background: var(--accent);
    border: 1px solid var(--accent);
    color: #fff;
    font-family: var(--mono);
    font-size: 0.75em;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-login:hover:not(:disabled) {
    background: var(--accent2);
    border-color: var(--accent2);
  }

  .btn-login:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .spinner {
    display: none;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  .spinner.show { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    display: none;
    background: rgba(122,42,42,0.15);
    border: 1px solid rgba(224,85,85,0.3);
    border-left: 3px solid var(--fail-t);
    color: var(--fail-t);
    font-family: var(--mono);
    font-size: 0.72em;
    padding: 10px 12px;
    border-radius: 2px;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .error-box.show { display: block; }

  .blocked-box {
    display: none;
    background: rgba(122,42,42,0.1);
    border: 1px solid rgba(224,85,85,0.2);
    color: var(--muted2);
    font-family: var(--mono);
    font-size: 0.68em;
    padding: 10px 12px;
    border-radius: 2px;
    margin-bottom: 20px;
    line-height: 1.7;
  }

  .blocked-box.show { display: block; }

  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-family: var(--mono);
    font-size: 0.6em;
    color: var(--muted);
    letter-spacing: 1px;
    line-height: 1.8;
  }

  .login-footer span { color: #3a4060; }
</style>
</head>
<body>

<div class="login-wrap">

  <div class="login-brand">
    <h1>Visibility</h1>
    <p>Portfolio Accounting System</p>
  </div>

  <div class="login-card">

    <div class="error-box"   id="error-box"></div>
    <div class="blocked-box" id="blocked-box"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="username" autocomplete="username" autofocus>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <span id="btn-label">Sign In</span>
    </button>

  </div>

  <div class="login-footer">
    <span>Access is logged · Unauthorized access is prohibited</span>
  </div>

</div>

<script>
  // Show IP blocked message if redirected with ?blocked=1
  const params = new URLSearchParams(window.location.search);
  if (params.get('blocked') === '1') {
    document.getElementById('blocked-box').className = 'blocked-box show';
    document.getElementById('blocked-box').textContent =
      'Access from your IP address is not permitted. Contact your administrator.';
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');
    const spinner  = document.getElementById('spinner');
    const label    = document.getElementById('btn-label');
    const errBox   = document.getElementById('error-box');

    if (!username || !password) {
      showError('Username and password are required');
      return;
    }

    btn.disabled    = true;
    spinner.classList.add('show');
    label.textContent = 'Signing in...';
    errBox.classList.remove('show');

    try {
      const res  = await fetch('/api/v1/auth/login', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (res.ok) {
        // Redirect to original destination or ops
        const next = params.get('next') || '/ops';
        window.location.href = next;
      } else {
        showError(data.detail || 'Login failed');
      }

    } catch(e) {
      showError('Connection error — server may be unavailable');
    }

    btn.disabled = false;
    spinner.classList.remove('show');
    label.textContent = 'Sign In';
  }

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.classList.add('show');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
</script>
</body>
</html>
